name: Rust Docs (rustdoc)

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      doc-args:
        description: "Extra arguments passed to cargo doc"
        type: string
        default: "--no-deps --all-features"

permissions:
  contents: read

jobs:
  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Build documentation
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: |
          set -euo pipefail
          cargo doc ${{ inputs.doc-args }}
