name: Rust Security (cargo-audit)

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      ignore-advisories:
        description: "Space-separated RUSTSEC IDs to ignore (e.g. 'RUSTSEC-2024-0001 RUSTSEC-2024-0002')"
        type: string
        default: ""

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Install cargo-audit
        run: |
          set -euo pipefail
          cargo install cargo-audit --locked

      - name: Run cargo audit
        run: |
          set -euo pipefail
          IGNORE_FLAGS=""
          for id in ${{ inputs.ignore-advisories }}; do
            IGNORE_FLAGS="$IGNORE_FLAGS --ignore $id"
          done
          # shellcheck disable=SC2086
          cargo audit $IGNORE_FLAGS
