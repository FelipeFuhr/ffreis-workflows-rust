name: Rust Test

on:
  workflow_call:
    inputs:
      toolchain:
        description: "Rust toolchain to use"
        type: string
        default: "stable"
      working-directory:
        description: "Directory containing the Cargo workspace"
        type: string
        default: "."
      test-args:
        description: "Extra arguments passed to cargo test"
        type: string
        default: "--all-features"
      timeout-minutes:
        description: "Job timeout in minutes"
        type: number
        default: 30

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    defaults:
      run:
        shell: bash
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          toolchain: ${{ inputs.toolchain }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5
        with:
          workspaces: "${{ inputs.working-directory }} -> target"

      - name: Run tests
        env:
          TEST_ARGS: ${{ inputs.test-args }}
        run: |
          set -euo pipefail
          read -r -a test_args_arr <<< "${TEST_ARGS:-}"
          cargo test "${test_args_arr[@]}"
